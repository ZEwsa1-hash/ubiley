<!doctype html>
<html lang="ru" class="invitation-locked">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#030b1d">
  <meta name="description" content="Приглашение на день рождения Карины — 24 октября 2026 года">
  <title>Карине 35 — приглашение в сказку</title>
  <link rel="preload" as="image" href="assets/images/00-envelope.webp?v=20260721-1" type="image/webp" fetchpriority="high">
  <link rel="stylesheet" href="css/style.css?v=20260721-16">
</head>
<body>
  <div class="invitation-cover" id="invitation-cover">
    <button class="cover-open effects-active" type="button" aria-label="Открыть приглашение">
      <picture>
        <source srcset="assets/images/00-envelope.webp?v=20260721-1" type="image/webp">
        <img class="cover-image" src="assets/images/00-envelope.png?v=20260721-1" alt="" width="941" height="1672" decoding="sync" fetchpriority="high">
      </picture>
      <div class="scene-effects lantern-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:35.6%;--y:5.7%;--size:12%;--delay:-.6s"></i>
        <i class="lantern-glow" style="--x:69.2%;--y:11.6%;--size:11%;--delay:-2.3s"></i>
        <i class="lantern-glow" style="--x:21.8%;--y:22%;--size:15%;--delay:-1.4s"></i>
        <i class="lantern-glow" style="--x:83%;--y:25.4%;--size:16%;--delay:-2.8s"></i>
      </div>
      <span class="cover-seal-glow" aria-hidden="true"></span>
    </button>
  </div>

  <main class="mobile-site" id="invitation">
    <section class="visual-section hero-section has-effects effects-active" aria-label="Приглашение на день рождения Карины">
      <div class="hero-scene">
        <picture>
          <source srcset="assets/images/01-hero.webp?v=20260721-10" type="image/webp">
          <img class="section-image" src="assets/images/01-hero.png?v=20260721-10" alt="Карине 35. Приглашает вас в восточную сказку 24 октября 2026 года" width="941" height="1671" decoding="async" fetchpriority="high">
        </picture>
        <div class="scene-effects lantern-effects" aria-hidden="true">
          <i class="lantern-glow" style="--x:47.5%;--y:2.1%;--size:7%;--delay:-.4s"></i>
          <i class="lantern-glow" style="--x:43%;--y:5.5%;--size:8%;--delay:-1.8s"></i>
          <i class="lantern-glow" style="--x:36%;--y:8.1%;--size:9%;--delay:-2.6s"></i>
          <i class="lantern-glow" style="--x:25.2%;--y:10%;--size:9%;--delay:-.9s"></i>
          <i class="lantern-glow" style="--x:65%;--y:9.5%;--size:9%;--delay:-2.1s"></i>
          <i class="lantern-glow" style="--x:75.8%;--y:14.3%;--size:10%;--delay:-1.3s"></i>
          <i class="lantern-glow" style="--x:20.5%;--y:16.6%;--size:12%;--delay:-2.9s"></i>
        </div>
        <button class="hotspot hero-open" type="button" aria-label="Открыть приглашение"></button>
        <button class="hotspot music-button" type="button" aria-label="Включить или выключить музыку" aria-pressed="false"></button>
      </div>
    </section>

    <section class="visual-section reveal has-effects" aria-label="О Карине">
      <picture>
        <source srcset="assets/images/02-about.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/02-about.png?v=20260721-10" alt="О Карине" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects lantern-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:19.7%;--y:51.5%;--size:10%;--delay:-.7s"></i>
        <i class="lantern-glow" style="--x:78.2%;--y:50.3%;--size:11%;--delay:-2.4s"></i>
        <i class="lantern-glow" style="--x:18.8%;--y:63.1%;--size:9%;--delay:-1.5s"></i>
        <i class="lantern-glow" style="--x:80.2%;--y:62.4%;--size:9%;--delay:-3s"></i>
        <i class="lantern-glow" style="--x:77.4%;--y:85.2%;--size:12%;--delay:-1.1s"></i>
        <i class="lantern-glow" style="--x:92%;--y:85.5%;--size:16%;--delay:-2.2s"></i>
      </div>
    </section>

    <section class="visual-section reveal has-effects" id="program" aria-label="Программа вечера">
      <picture>
        <source srcset="assets/images/03-program.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/03-program.png?v=20260721-10" alt="Программа вечера: Welcome-зона, банкет, финал и караоке на востоке" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:8.7%;--y:87.3%;--size:16%;--delay:-.8s"></i>
        <i class="lantern-glow" style="--x:89.2%;--y:89.2%;--size:14%;--delay:-2.5s"></i>
        <span class="smoke-source smoke-source--left" style="--x:25.5%;--y:86.8%;--width:19%;--tilt:-8deg">
          <i style="--drift:-24%;--delay:-.5s"></i><i style="--drift:22%;--delay:-2.4s"></i><i style="--drift:-8%;--delay:-4.2s"></i>
        </span>
      </div>
    </section>

    <section class="visual-section reveal venue-section has-effects" aria-label="Место проведения">
      <picture>
        <source srcset="assets/images/04-venue.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/04-venue.png?v=20260721-10" alt="Место проведения праздника в Челябинске" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:10%;--y:54.4%;--size:14%;--delay:-1s"></i>
        <i class="lantern-glow" style="--x:86.7%;--y:54.4%;--size:14%;--delay:-2.7s"></i>
        <i class="lantern-glow" style="--x:38%;--y:34.8%;--size:8%;--delay:-1.9s"></i>
        <i class="lantern-glow" style="--x:51%;--y:31.8%;--size:7%;--delay:-.3s"></i>
        <i class="lantern-glow" style="--x:77%;--y:36.8%;--size:7%;--delay:-2.1s"></i>
        <span class="smoke-source smoke-source--right" style="--x:75.4%;--y:88.8%;--width:17%;--tilt:7deg">
          <i style="--drift:26%;--delay:-1.1s"></i><i style="--drift:-18%;--delay:-3s"></i><i style="--drift:7%;--delay:-4.8s"></i>
        </span>
      </div>
      <a class="hotspot map-link" href="https://yandex.ru/maps/56/chelyabinsk/?ll=61.404790%2C55.072969&mode=search&oid=83281722996&ol=biz&z=15" target="_blank" rel="noopener noreferrer" aria-label="Открыть место проведения на Яндекс Картах"></a>
    </section>

    <section class="visual-section compact-section reveal has-effects" aria-label="Дресс-код">
      <picture>
        <source srcset="assets/images/05-dress-code.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/05-dress-code.png?v=20260721-10" alt="Дресс-код в восточном стиле и рекомендуемые цвета" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects lantern-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:40.2%;--y:57.4%;--size:18%;--delay:-1.4s"></i>
      </div>
    </section>

    <section class="visual-section wide-reference reveal has-effects" aria-label="Пожелания">
      <picture>
        <source srcset="assets/images/06-details.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/06-details.png?v=20260721-10" alt="Пожелания по подаркам" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:10.8%;--y:29.3%;--size:16%;--delay:-.6s"></i>
        <i class="lantern-glow" style="--x:88.4%;--y:29.3%;--size:16%;--delay:-2.2s"></i>
        <span class="smoke-source smoke-source--left" style="--x:20.3%;--y:84.6%;--width:20%;--tilt:-10deg">
          <i style="--drift:-22%;--delay:-1.6s"></i><i style="--drift:24%;--delay:-3.4s"></i><i style="--drift:-5%;--delay:-5.1s"></i>
        </span>
      </div>
    </section>

    <section class="visual-section countdown-section reveal has-effects" aria-label="Обратный отсчёт до дня рождения Карины">
      <picture>
        <source srcset="assets/images/07-countdown.webp?v=20260721-10" type="image/webp">
        <img class="section-image" src="assets/images/07-countdown.png?v=20260721-10" alt="До дня рождения Карины осталось" width="1748" height="900" loading="lazy" decoding="async">
      </picture>
      <div class="scene-effects" aria-hidden="true">
        <i class="lantern-glow" style="--x:12.5%;--y:39%;--size:10%;--delay:-2.5s"></i>
        <span class="smoke-source smoke-source--left smoke-source--wide" style="--x:25.8%;--y:57%;--width:10%;--tilt:-13deg">
          <i style="--drift:-28%;--delay:-.8s"></i><i style="--drift:26%;--delay:-2.7s"></i><i style="--drift:-4%;--delay:-4.5s"></i>
        </span>
      </div>
      <div class="countdown-overlay" role="timer" aria-live="polite" aria-atomic="true">
        <span class="countdown-number countdown-days" data-unit="days">95</span>
        <span class="countdown-number countdown-hours" data-unit="hours">00</span>
        <span class="countdown-number countdown-minutes" data-unit="minutes">00</span>
        <span class="countdown-number countdown-seconds" data-unit="seconds">00</span>
      </div>
      <p class="countdown-finished" hidden>Праздник уже начался!</p>
    </section>

    <section class="visual-section form-section reveal" aria-label="Анкета гостя">
      <picture>
        <source srcset="assets/images/08-form.webp?v=20260721-10" type="image/webp">
        <img class="section-image form-background" src="assets/images/08-form.png?v=20260721-10" alt="Анкета гостя" width="941" height="1672" loading="lazy" decoding="async">
      </picture>
      <form id="guest-form" class="guest-form" novalidate>
        <label class="sr-only" for="fullName">Имя и фамилия</label>
        <input id="fullName" name="fullName" class="form-control field-name" type="text" autocomplete="name" placeholder="Введите имя и фамилию" required>

        <fieldset class="choice-group attendance-group">
          <legend class="sr-only">Подтверждение присутствия</legend>
          <label class="choice choice-attend">
            <input type="radio" name="attendance" value="Буду с удовольствием" required>
            <span class="sr-only">Буду с удовольствием</span>
          </label>
          <label class="choice choice-decline">
            <input type="radio" name="attendance" value="К сожалению, не смогу">
            <span class="sr-only">К сожалению, не смогу</span>
          </label>
        </fieldset>

        <label class="sr-only" for="alcohol">Какой алкоголь предпочитаете</label>
        <select id="alcohol" name="alcohol" class="form-control select-control field-alcohol" required>
          <option value="" selected disabled>Выберите напиток</option>
          <option>Не употребляю алкоголь</option>
          <option>Вино</option>
          <option>Шампанское</option>
          <option>Коньяк</option>
          <option>Виски</option>
          <option>Водка</option>
          <option>Другое</option>
        </select>

        <fieldset class="choice-group children-group">
          <legend class="sr-only">Будут ли с вами дети</legend>
          <label class="choice choice-children-yes">
            <input type="radio" name="children" value="Да" required>
            <span class="sr-only">Да</span>
          </label>
          <label class="choice choice-children-no">
            <input type="radio" name="children" value="Нет">
            <span class="sr-only">Нет</span>
          </label>
        </fieldset>

        <label class="sr-only" for="childrenCount">Количество детей</label>
        <select id="childrenCount" name="childrenCount" class="form-control select-control field-children-count" disabled>
          <option value="0" selected>Укажите количество</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <button class="hotspot submit-button" type="submit" aria-label="Отправить ответ"></button>
        <p class="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="contacts-section reveal" aria-labelledby="contacts-title">
      <div class="contacts-ornament" aria-hidden="true">☾</div>
      <h2 id="contacts-title">Контакты</h2>
      <p>По вопросам творческих подарков, сюрпризов и организации праздника можно звонить или писать:</p>
      <a href="tel:+79969464952"><strong>Кристина</strong><span>организатор</span><b>8 996 946-49-52</b></a>
      <a href="tel:+79511111103"><strong>Николай</strong><span>ведущий</span><b>8 951 111-11-03</b></a>
      <div class="contacts-footer">До встречи в сказке!</div>
    </section>
  </main>

  <audio id="background-music" preload="none" loop data-src="assets/audio/aleksejj-chumakov-arabskaja-noch.mp3?v=20260720-3"></audio>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="js/config.js?v=20260720-3"></script>
  <script src="js/script.js?v=20260721-11"></script>
</body>
</html>
